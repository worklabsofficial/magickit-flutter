name: Notify Ucup Agent

on:
  issues:
    types: [opened, reopened, edited]
  pull_request:
    types: [opened, reopened, edited]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Telegram
        env:
          BOT_TOKEN: "8702114013:AAFqBB7uaTxUV76q38pZ02HVb1cvxhSvX_g"
          CHAT_ID: "5870411602"
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            EVT_TITLE="${{ github.event.issue.title }}"
            EVT_NUMBER="${{ github.event.issue.number }}"
            EVT_URL="${{ github.event.issue.html_url }}"
            EVT_TYPE="Issue"
            EVT_ACTION="${{ github.event.action }}"
          else
            EVT_TITLE="${{ github.event.pull_request.title }}"
            EVT_NUMBER="${{ github.event.pull_request.number }}"
            EVT_URL="${{ github.event.pull_request.html_url }}"
            EVT_TYPE="Pull Request"
            EVT_ACTION="${{ github.event.action }}"
          fi

          python3 -c "
import json
import urllib.request

msg = f'''🔔 GitHub {EVT_TYPE} {EVT_ACTION}

📋 Repo: ${{ github.repository }}
🔲 Number: #{EVT_NUMBER}
📝 Title: {EVT_TITLE}
🔗 URL: {EVT_URL}

Reply to ucupagent bot with:
• /gh-issues worklabsofficial/magickit-flutter --yes (auto-fix all)
• /gh-issues worklabsofficial/magickit-flutter (review first)
• Or specify issue number(s) to fix'''

payload = {
    'chat_id': '${CHAT_ID}',
    'text': msg,
    'parse_mode': 'HTML'
}

req = urllib.request.Request(
    'https://api.telegram.org/bot${BOT_TOKEN}/sendMessage',
    data=json.dumps(payload).encode(),
    headers={'Content-Type': 'application/json'},
    method='POST'
)

with urllib.request.urlopen(req) as resp:
    print(resp.read().decode())
"
